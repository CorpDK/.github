name: Sonar

on:
  workflow_call:
    inputs:
      sonar-host-url:
        description: SonarQube/SonarCloud host URL
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
